<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Magico88 – 88Finacio Constellation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg: #05000b;
      --panel: #11051f;
      --accent: #ffcc33;
      --accent-strong: #ff8800;
      --accent-soft: #ffc76a;
      --danger: #ff3355;
      --text: #fef4df;
      --muted: #b19988;
      --border: #3a163e;
      --green: #44dd88;
      --purple: #a052ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #260a3f 0, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 1.4rem 2rem 0.8rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .logo-block {
      display: flex;
      align-items: center;
      gap: 0.9rem;
    }
    .dragon-orb {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: radial-gradient(circle at 25% 25%, #ffeeb0, #f9a41f 45%, #7b0d00 100%);
      box-shadow:
        0 0 12px rgba(255, 204, 51, 0.8),
        0 0 32px rgba(208, 64, 16, 0.9);
      position: relative;
      overflow: hidden;
    }
    .dragon-orb::before {
      content: "88";
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      color: #3c0400;
      font-size: 1.4rem;
      text-shadow: 0 0 3px rgba(255, 255, 255, 0.7);
    }
    .logo-main {
      font-size: 1.5rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .logo-sub {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    .badge {
      padding: 0.22rem 0.7rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 204, 51, 0.4);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent);
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }
    .status-dot {
      width: 0.4rem;
      height: 0.4rem;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px rgba(68, 221, 136, 0.9);
    }
    .status-dot.off {
      background: #666;
      box-shadow: none;
    }
    main {
      flex: 1;
      padding: 0.75rem 2rem 1.4rem;
      display: grid;
      grid-template-columns: minmax(0, 2.4fr) minmax(0, 3.1fr);
      gap: 1.2rem;
    }
    @media (max-width: 1080px) {
      main { grid-template-columns: minmax(0, 1fr); }
    }
    .panel {
      background: linear-gradient(145deg, rgba(25, 8, 45, 0.96), rgba(8, 2, 24, 0.95));
      border-radius: 1.15rem;
      padding: 1rem 1.25rem;
      border: 1px solid var(--border);
      box-shadow:
        0 16px 32px rgba(0, 0, 0, 0.75),
        inset 0 0 0 1px rgba(255, 255, 255, 0.03);
    }
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }
    .panel-header h2 {
      margin: 0;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }
    .panel-tagline {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.1rem;
    }
    .field-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 0.25rem;
    }
    .field-row {
      display: flex;
      flex-direction: column;
      margin-bottom: 0.7rem;
    }
    .field-row.inline {
      flex-direction: row;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem;
    }
    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 0.46rem 0.55rem;
      border-radius: 0.55rem;
      border: 1px solid rgba(134, 98, 168, 0.9);
      background: rgba(5, 2, 15, 0.9);
      color: var(--text);
      font-size: 0.84rem;
      outline: none;
    }
    input[type="text"]:focus,
    input[type="number"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(255, 204, 51, 0.6);
    }
    button {
      border-radius: 0.6rem;
      border: 1px solid transparent;
      padding: 0.42rem 0.8rem;
      font-size: 0.82rem;
      background: linear-gradient(145deg, var(--accent), var(--accent-strong));
      color: #2a0500;
      font-weight: 600;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: transform 0.07s ease, box-shadow 0.07s ease, filter 0.07s ease;
    }
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.65);
      filter: brightness(1.05);
    }
    button.secondary {
      background: transparent;
      border-color: rgba(221, 180, 255, 0.75);
      color: var(--text);
    }
    button.danger {
      background: linear-gradient(145deg, var(--danger), #ff6600);
      color: #190101;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.18rem 0.55rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 204, 51, 0.4);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent-soft);
      background: rgba(56, 16, 80, 0.9);
    }
    .grid-two {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.7rem;
    }
